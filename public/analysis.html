<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Physics 1 · Learning Analytics</title>
    <meta name="description" content="Track your AP Physics 1 practice progress. View score trends, accuracy rates, and identify weak areas.">
    <script src="auth-guard.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif+SC:wght@400;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4A90D9; --primary-dark: #2C5282; --primary-light: #E8F0F8;
            --primary-bg: #F0F6FC; --bg: #F5F7FA; --paper: #FFFFFF;
            --ink: #1A202C; --ink-light: #718096; --warm: #E2E8F0;
            --success: #48bb78; --error: #f56565;
            --font-serif: 'Playfair Display', 'Noto Serif SC', serif;
            --font-sans: 'Raleway', 'Noto Serif SC', sans-serif;
        }
        body { font-family: var(--font-sans); background: var(--bg); min-height: 100vh; color: var(--ink); }
        .page { max-width: 800px; margin: 0 auto; padding: 40px 24px 60px; }

        .site-header { text-align: center; margin-bottom: 40px; }
        .site-header h1 { font-family: var(--font-serif); font-size: 2.2rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 8px; }
        .site-header .tagline { color: var(--ink-light); font-size: 1rem; }

        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--primary); text-decoration: none; font-size: 0.88rem;
            margin-bottom: 32px; padding: 6px 16px;
            border: 1px solid var(--primary-light); border-radius: 999px;
            background: var(--primary-bg); transition: all 0.2s;
        }
        .back-link:hover { background: var(--primary-light); color: var(--primary-dark); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 36px; }
        .stat-card {
            background: var(--paper); border: 1px solid var(--warm); border-radius: 14px;
            padding: 24px; text-align: center;
        }
        .stat-number { font-family: var(--font-serif); font-size: 2rem; font-weight: 600; color: var(--primary-dark); }
        .stat-label { color: var(--ink-light); font-size: 0.82rem; margin-top: 4px; }

        .section { margin-bottom: 36px; }
        .section h2 {
            font-family: var(--font-serif); font-size: 1.3rem; font-weight: 600;
            margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid var(--primary-light);
        }

        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-item {
            background: var(--paper); border: 1px solid var(--warm); border-radius: 12px;
            padding: 18px 24px; display: flex; justify-content: space-between; align-items: center;
        }
        .history-date { color: var(--ink-light); font-size: 0.85rem; }
        .history-score { font-family: var(--font-serif); font-size: 1.2rem; font-weight: 600; color: var(--primary-dark); }
        .history-ap {
            padding: 4px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
        }
        .ap-5 { background: #c6f6d5; color: #276749; }
        .ap-4 { background: #c6e3f4; color: #2b6cb0; }
        .ap-3 { background: #fefcbf; color: #975a16; }
        .ap-2 { background: #fed7aa; color: #9c4221; }
        .ap-1 { background: #fed7d7; color: #9b2c2c; }

        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--ink-light);
            font-family: var(--font-serif); font-size: 1rem;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }

        .chart-container {
            background: var(--paper); border: 1px solid var(--warm); border-radius: 14px;
            padding: 24px; min-height: 200px; position: relative;
        }
        .chart-bar-row {
            display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
        }
        .chart-label { width: 40px; text-align: right; font-size: 0.78rem; color: var(--ink-light); flex-shrink: 0; }
        .chart-bar-bg { flex: 1; height: 28px; background: var(--bg); border-radius: 6px; overflow: hidden; }
        .chart-bar-fill {
            height: 100%; border-radius: 6px; display: flex; align-items: center;
            padding-left: 8px; font-size: 0.75rem; color: white; font-weight: 500;
            transition: width 0.6s ease;
        }
        .chart-bar-fill.good { background: var(--success); }
        .chart-bar-fill.mid { background: #ecc94b; }
        .chart-bar-fill.low { background: var(--error); }

        .clear-btn {
            margin-top: 24px; padding: 10px 24px; border: 1px solid var(--warm); border-radius: 18px;
            background: none; color: var(--ink-light); font-family: inherit; font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s;
        }
        .clear-btn:hover { color: var(--error); border-color: var(--error); }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .site-header h1 { font-size: 1.8rem; }
            .page { padding: 24px 16px 40px; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="site-header">
            <h1>Learning Analytics</h1>
            <p class="tagline">AP Physics 1 Practice Progress</p>
        </div>

        <a class="back-link" href="index.html">← Back to Home</a>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="totalAttempts">0</div>
                <div class="stat-label">Total Attempts</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="bestScore">-</div>
                <div class="stat-label">Best Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgAccuracy">-</div>
                <div class="stat-label">Avg Accuracy</div>
            </div>
        </div>

        <div class="section">
            <h2>Score Trend</h2>
            <div class="chart-container" id="scoreChart"></div>
        </div>

        <div class="section">
            <h2>Practice History</h2>
            <div id="historyList"></div>
        </div>

        <div style="text-align:center;">
            <button class="clear-btn" onclick="clearHistory()">Clear History</button>
        </div>
    </div>

    <script>
    function loadHistory() {
        try {
            return JSON.parse(localStorage.getItem('ap_physics_history') || '[]');
        } catch { return []; }
    }

    function render() {
        const history = loadHistory();

        // Stats
        document.getElementById('totalAttempts').textContent = history.length;

        if (history.length === 0) {
            document.getElementById('bestScore').textContent = '-';
            document.getElementById('avgAccuracy').textContent = '-';
            document.getElementById('scoreChart').innerHTML = '<div class="empty-state"><div class="icon">📊</div><div>Complete a practice quiz to see your analytics.</div></div>';
            document.getElementById('historyList').innerHTML = '<div class="empty-state"><div class="icon">📝</div><div>No practice history yet.<br>Go to the quiz page to start practicing!</div></div>';
            return;
        }

        const best = Math.max(...history.map(h => h.score));
        const total = history[0]?.total || 70;
        const avgPct = Math.round(history.reduce((s, h) => s + h.score / (h.total || 70), 0) / history.length * 100);

        document.getElementById('bestScore').textContent = best + '/' + total;
        document.getElementById('avgAccuracy').textContent = avgPct + '%';

        // Score chart (bar chart of recent attempts)
        const recent = history.slice(0, 10).reverse();
        let chartHtml = '';
        recent.forEach((h, i) => {
            const pct = Math.round(h.score / (h.total || 70) * 100);
            const cls = pct >= 70 ? 'good' : pct >= 40 ? 'mid' : 'low';
            const label = '#' + (history.length - recent.length + i + 1);
            chartHtml += `
                <div class="chart-bar-row">
                    <div class="chart-label">${label}</div>
                    <div class="chart-bar-bg">
                        <div class="chart-bar-fill ${cls}" style="width:${Math.max(pct, 8)}%">${pct}%</div>
                    </div>
                </div>`;
        });
        document.getElementById('scoreChart').innerHTML = chartHtml;

        // History list
        let listHtml = '';
        history.forEach(h => {
            const date = new Date(h.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            const pct = Math.round(h.score / (h.total || 70) * 100);
            listHtml += `
                <div class="history-item">
                    <div>
                        <div class="history-score">${h.score}/${h.total || 70} (${pct}%)</div>
                        <div class="history-date">${date}</div>
                    </div>
                    <span class="history-ap ap-${h.ap || 1}">AP ${h.ap || 1}</span>
                </div>`;
        });
        document.getElementById('historyList').innerHTML = '<div class="history-list">' + listHtml + '</div>';
    }

    function clearHistory() {
        if (confirm('Clear all practice history? This cannot be undone.')) {
            localStorage.removeItem('ap_physics_history');
            render();
        }
    }

    render();
    </script>
</body>
</html>
